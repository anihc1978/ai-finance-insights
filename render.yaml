# Render blueprint for the FastAPI backend (an alternative to Railway).
# The frontend deploys separately on Vercel (Root Directory: frontend).
# Set the secret env vars in the Render dashboard — they are marked sync:false.
services:
  - type: web
    name: ai-finance-insights-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # CORS allowlist: set to your deployed frontend origin(s), comma-separated.
      # e.g. https://your-app.netlify.app  (config.py reads ALLOWED_ORIGINS)
      - key: ALLOWED_ORIGINS
        sync: false
