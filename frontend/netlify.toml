# Netlify build + SPA config for the Vite/React frontend.
# Set VITE_API_BASE, VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY in the
# Netlify dashboard (Site settings -> Environment variables) before deploying.
#
# Vercel works too with no extra config (it auto-detects Vite). The repo already
# ships a vercel.json with the same SPA rewrite; ignore this file if using Vercel.

[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback: every path serves index.html so client-side routing works.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
